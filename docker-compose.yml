version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sigeporcino-app
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
    restart: unless-stopped
    # Si necesitas variables de entorno adicionales, agrégalas aquí
    # env_file:
    #   - .env.production
